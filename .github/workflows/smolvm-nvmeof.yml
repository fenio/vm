name: NVMe-oF with smolvm

on:
  push:
  workflow_dispatch:

jobs:
  smolvm-nvmeof:
    runs-on: ubuntu-latest
    steps:
      - name: System info
        run: |
          echo "=== CPU ==="
          nproc
          echo "=== KVM ==="
          ls -la /dev/kvm 2>/dev/null || echo "/dev/kvm not found"
          echo "=== Kernel ==="
          uname -r

      - name: Enable KVM access
        run: sudo chmod 666 /dev/kvm

      - name: Install smolvm from source
        timeout-minutes: 15
        run: |
          # Install build dependencies
          sudo apt-get update -qq
          sudo apt-get install -y -qq git-lfs

          # Install Rust
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"

          # Clone and build
          git clone https://github.com/smol-machines/smolvm.git /tmp/smolvm
          cd /tmp/smolvm
          git lfs pull

          LIBKRUN_BUNDLE=./lib/linux-x86_64 cargo build --release --bin smolvm

          # Install binary + libs
          mkdir -p "$HOME/.smolvm/bin" "$HOME/.smolvm/lib"
          cp target/release/smolvm "$HOME/.smolvm/bin/smolvm-bin"
          cp -a ./lib/linux-x86_64/libkrun*.so* "$HOME/.smolvm/lib/"

          cat > "$HOME/.smolvm/bin/smolvm" <<'WRAPPER'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
          export LD_LIBRARY_PATH="$(dirname "$SCRIPT_DIR")/lib:${LD_LIBRARY_PATH:-}"
          exec "$SCRIPT_DIR/smolvm-bin" "$@"
          WRAPPER
          chmod +x "$HOME/.smolvm/bin/smolvm"

          # Build and install agent rootfs
          ./scripts/build-agent-rootfs.sh --install

          echo "$HOME/.smolvm/bin" >> $GITHUB_PATH

      - name: Verify smolvm works
        run: |
          smolvm --version
          smolvm sandbox run --net alpine:latest -- echo "smolvm works on GitHub runner"

      - name: Test NVMe module support in smolvm
        run: |
          echo "=== Checking NVMe support inside smolvm sandbox ==="
          smolvm sandbox run --net alpine:latest -- sh -c '
            echo "--- Kernel version ---"
            uname -r
            echo "--- Try loading nvme-tcp ---"
            modprobe nvme-tcp 2>&1 || echo "FAIL: nvme-tcp module not available"
            echo "--- Try loading nvmet ---"
            modprobe nvmet 2>&1 || echo "FAIL: nvmet module not available"
            echo "--- /proc/modules ---"
            cat /proc/modules 2>/dev/null | grep nvme || echo "No nvme modules loaded"
            echo "--- Kernel config check ---"
            zcat /proc/config.gz 2>/dev/null | grep -i nvme || echo "No /proc/config.gz or no NVMe config"
          ' 2>&1 || true

          echo ""
          echo "========================================="
          echo "CONCLUSION: smolvm uses a minimal libkrunfw kernel."
          echo "NVMe-oF modules (nvme-tcp, nvmet, nvmet-tcp) are not included."
          echo "For NVMe-oF testing, use QEMU with a full kernel."
          echo "========================================="
