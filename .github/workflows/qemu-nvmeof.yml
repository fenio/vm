name: NVMe-oF with QEMU

on:
  push:
  workflow_dispatch:

jobs:
  qemu-nvmeof:
    runs-on: ubuntu-latest
    steps:
      - name: System info
        run: |
          echo "=== CPU: $(nproc) cores ==="
          grep -c -E '(vmx|svm)' /proc/cpuinfo || echo "No hardware virt flags"
          echo "=== Memory ==="
          free -h
          echo "=== KVM ==="
          ls -la /dev/kvm 2>/dev/null || echo "/dev/kvm not found"
          echo "=== Kernel: $(uname -r) ==="

      - name: Enable KVM access
        run: sudo chmod 666 /dev/kvm

      - name: Install QEMU and dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-system-x86 qemu-utils cloud-image-utils wget libguestfs-tools

      - name: Download and prepare cloud image
        run: |
          wget -q https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img
          qemu-img resize ubuntu-24.04-server-cloudimg-amd64.img 8G

          # Pre-install nvme-cli into the image to avoid slow apt-get inside VM
          sudo virt-customize -a ubuntu-24.04-server-cloudimg-amd64.img \
            --install nvme-cli \
            --run-command 'apt-get clean'

      - name: Create test script and cloud-init
        run: |
          cat > test-nvmeof.sh <<'SCRIPT'
          #!/bin/bash
          set -ex
          exec > /dev/ttyS0 2>&1

          echo "=== Loading NVMe modules ==="
          modprobe configfs
          modprobe nvme
          modprobe nvme-tcp
          modprobe nvmet
          modprobe nvmet-tcp
          lsmod | grep nvme

          echo "=== Setting up NVMe-oF loopback target ==="
          mount -t configfs none /sys/kernel/config 2>/dev/null || true
          truncate -s 100M /tmp/nvme-target.img

          mkdir -p /sys/kernel/config/nvmet/subsystems/test-subsys
          echo 1 > /sys/kernel/config/nvmet/subsystems/test-subsys/attr_allow_any_host
          mkdir -p /sys/kernel/config/nvmet/subsystems/test-subsys/namespaces/1
          echo "/tmp/nvme-target.img" > /sys/kernel/config/nvmet/subsystems/test-subsys/namespaces/1/device_path
          echo 1 > /sys/kernel/config/nvmet/subsystems/test-subsys/namespaces/1/enable

          mkdir -p /sys/kernel/config/nvmet/ports/1
          echo 127.0.0.1 > /sys/kernel/config/nvmet/ports/1/addr_traddr
          echo 4420 > /sys/kernel/config/nvmet/ports/1/addr_trsvcid
          echo tcp > /sys/kernel/config/nvmet/ports/1/addr_trtype
          echo ipv4 > /sys/kernel/config/nvmet/ports/1/addr_adrfam
          ln -s /sys/kernel/config/nvmet/subsystems/test-subsys /sys/kernel/config/nvmet/ports/1/subsystems/test-subsys

          echo "=== Connecting as NVMe-oF initiator ==="
          nvme discover -t tcp -a 127.0.0.1 -s 4420
          nvme connect -t tcp -n test-subsys -a 127.0.0.1 -s 4420
          sleep 2

          echo "=== NVMe devices ==="
          nvme list
          lsblk

          if [ ! -b /dev/nvme0n1 ]; then
            echo "NVMEOF_RESULT=FAIL - /dev/nvme0n1 not found"
            echo "DONE"
            exit 1
          fi

          echo "=== Formatting and mounting ==="
          mkfs.ext4 -F /dev/nvme0n1
          mkdir -p /mnt/nvme
          mount /dev/nvme0n1 /mnt/nvme
          echo "hello from nvme-of" > /mnt/nvme/test.txt
          cat /mnt/nvme/test.txt
          df -h /mnt/nvme

          echo "NVMEOF_RESULT=SUCCESS"
          echo "DONE"
          SCRIPT

          # Generate cloud-init user-data with Python to avoid YAML/heredoc issues
          python3 << 'PYEOF'
          import base64, yaml

          with open('test-nvmeof.sh', 'rb') as f:
              b64 = base64.b64encode(f.read()).decode()

          config = {
              'password': 'test1234',
              'chpasswd': {'expire': False},
              'write_files': [{
                  'path': '/root/test-nvmeof.sh',
                  'permissions': '0755',
                  'encoding': 'b64',
                  'content': b64,
              }],
              'runcmd': [
                  '/root/test-nvmeof.sh',
              ]
          }

          with open('user-data', 'w') as f:
              f.write('#cloud-config\n')
              yaml.dump(config, f, default_flow_style=False, width=4096)
          PYEOF

          echo "=== Generated user-data (first 10 lines) ==="
          head -10 user-data
          echo "==========================="

          cloud-localds seed.img user-data

      - name: Boot QEMU VM and test NVMe-oF
        timeout-minutes: 10
        run: |
          timeout 480 qemu-system-x86_64 \
            -enable-kvm \
            -m 2048 \
            -smp 2 \
            -cpu host \
            -nographic \
            -serial mon:stdio \
            -drive file=ubuntu-24.04-server-cloudimg-amd64.img,format=qcow2,if=virtio \
            -drive file=seed.img,format=raw,if=virtio \
            -netdev user,id=net0 \
            -device virtio-net-pci,netdev=net0 \
            2>&1 | tee vm-output.log &

          VM_PID=$!

          for i in $(seq 1 90); do
            if grep -q "DONE" vm-output.log 2>/dev/null; then
              echo "VM finished NVMe-oF test"
              break
            fi
            sleep 5
          done

          kill $VM_PID 2>/dev/null || true
          wait $VM_PID 2>/dev/null || true

          echo ""
          echo "========================================="
          echo "=== VM Serial Output ==="
          echo "========================================="
          cat vm-output.log

          if grep -q "NVMEOF_RESULT=SUCCESS" vm-output.log; then
            echo ""
            echo "NVMe-oF mount test PASSED inside QEMU VM on GitHub runner"
          else
            echo ""
            echo "NVMe-oF mount test FAILED"
            exit 1
          fi
